name: Contract Address Sync

on:
  push:
    paths:
      - 'craft-nexus-contract/README.md'
      - 'craft-nexus-contract/stellar.toml'
      - 'craft-nexus-contract/scripts/check-contract-addresses.sh'
  pull_request:
    paths:
      - 'craft-nexus-contract/README.md'
      - 'craft-nexus-contract/stellar.toml'
      - 'craft-nexus-contract/scripts/check-contract-addresses.sh'

jobs:
  check-contract-addresses:
    name: Verify contract addresses match
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README and stellar.toml are in sync
        run: bash craft-nexus-contract/scripts/check-contract-addresses.sh
