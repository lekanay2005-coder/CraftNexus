name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: craft-nexus-contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt -- --check
        # Issue #682: Fail the build if any Rust file is not formatted.
        # Run `cargo fmt` locally to auto-fix before pushing.
        run: cargo fmt -- --check

  # ── Build & check ────────────────────────────────────────────────────────
  check:
    name: cargo check (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: craft-nexus-contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            craft-nexus-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('craft-nexus-contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check --tests
        run: cargo check --tests

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: craft-nexus-contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            craft-nexus-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('craft-nexus-contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test

  # ── WASM build ───────────────────────────────────────────────────────────
  build-wasm:
    name: WASM release build
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: craft-nexus-contract
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            craft-nexus-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('craft-nexus-contract/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build --target wasm32-unknown-unknown --release
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install wasm-opt (binaryen)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: wasm-opt size optimization (Issue #681)
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name "*.wasm" | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "No WASM file found; skipping wasm-opt step."
            exit 0
          fi
          BEFORE=$(wc -c < "$WASM_FILE")
          wasm-opt -Oz --output optimized.wasm "$WASM_FILE"
          AFTER=$(wc -c < optimized.wasm)
          echo "Unoptimized: ${BEFORE} bytes"
          echo "Optimized:   ${AFTER} bytes"
          REDUCTION=$(( (BEFORE - AFTER) * 100 / BEFORE ))
          echo "Reduction:   ${REDUCTION}%"

      - name: Upload optimized WASM artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: optimized-wasm
          path: craft-nexus-contract/optimized.wasm
          if-no-files-found: ignore
